name: Flow Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Verify Version Synchronization
        run: node scripts/verify-versions.js

      - name: Run Lint
        run: npm run lint

      - name: Run TypeScript Check
        run: npm run typecheck

      - name: Run Tests
        run: npm test

      - name: Build Production App
        run: npm run build
