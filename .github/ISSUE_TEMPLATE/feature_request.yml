name: Feature Request
description: Suggest an improvement for Flow.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Feature Summary
      description: A clear and concise summary of the proposed feature or improvement.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem Or Use Case
      description: What problem does this feature solve, or what use case does it address?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the changes or functionality you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you have considered.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Platform Area
      description: Select the primary area of the app affected by this feature.
      options:
        - Expenses
        - Budgets
        - Notes
        - Graphs
        - Account/Profile
        - Import/Export Backup
        - Android Native
        - Settings
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context or visual examples about the feature request here.
    validations:
      required: false
